<html>
    <body bgcolor="#C8A2C8" align="center">
        <h3>JOB REGISTRATION FORM</h3>
        <form align="center">
            Name: <input type="text" id="one" placeholder="Enter your name"> <br>
            Email: <input type="email" id="two" placeholder="Enter your mail"> <br>
            Mobile: <input type="number" id="three" placeholder="Enter mobile No"><br>
            <input type="button" value="submit" onclick="return validate()">
        </form>
        <script>
            function validate()
            {
                var un=document.getElementById("one");
                var uname=un.value;
                var mail=document.getElementById("two");
                var email=mail.value;
                var mn=document.getElementById("three");
                var mob=mn.value;
                var unre=/^[a-z A-Z]+[0-9a-zA-Z._]*$/;
                var ere=/^[a-zA-Z]+([\._]?\w+)*@\w([\._]?\w+)*(\.\w{2,3})+$/;
                var mre=/^[6-9][0-9]{9}$/;
                if(unre.test(uname))
                {
                    if(ere.test(email))
                    {
                        if(mre.test(mob))
                        {
                            alert("Successfully Registered!!");
                            return true;
                        }
                        else
                        {
                            return error(mn);
                        }
                    }
                    else
                    {
                        return error(mail);
                    }
                }
                else
                {
                    return error(un);
                }
            }
            function error(ele)
            {
                alert("INVALID !!!");
                ele.style.border="2px solid red";
                ele.value="";
                ele.placeholder="INVALID!!";
                ele.focus();
                return false;
            }
        </script>
        <h3 align="center"> K Shiva prasanna </h3>
        <h3 align="center"> 24881A1297 </h3>
    </body>
</html>
